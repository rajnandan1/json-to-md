<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>json-to-md · live demo</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #ffffff;
        --panel: #f6f8fa;
        --border: #d0d7de;
        --text: #1f2328;
        --muted: #656d76;
        --accent: #0969da;
        --danger: #cf222e;
        --danger-bg: #ffebe9;
        --code-bg: #f6f8fa;
        --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
        --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0d1117;
          --panel: #161b22;
          --border: #30363d;
          --text: #e6edf3;
          --muted: #8b949e;
          --accent: #4493f8;
          --danger: #ff7b72;
          --danger-bg: #2d1214;
          --code-bg: #161b22;
        }
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: var(--sans);
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
      }
      header {
        padding: 1.5rem clamp(1rem, 4vw, 2.5rem) 1rem;
        border-bottom: 1px solid var(--border);
      }
      header h1 { margin: 0; font-size: 1.4rem; }
      header h1 code { font-family: var(--mono); color: var(--accent); }
      header p { margin: 0.35rem 0 0; color: var(--muted); font-size: 0.9rem; max-width: 60ch; }
      main {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1px;
        background: var(--border);
        min-height: calc(100vh - 92px);
      }
      @media (max-width: 820px) { main { grid-template-columns: 1fr; } }
      .pane { background: var(--bg); display: flex; flex-direction: column; min-width: 0; }
      .pane-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
        padding: 0.6rem clamp(0.75rem, 2vw, 1.25rem);
        border-bottom: 1px solid var(--border);
        background: var(--panel);
        flex-wrap: wrap;
      }
      .pane-head strong { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); }
      .examples { display: flex; flex-wrap: wrap; gap: 0.35rem; }
      button {
        font: inherit;
        font-size: 0.78rem;
        padding: 0.25rem 0.6rem;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: var(--bg);
        color: var(--text);
        cursor: pointer;
      }
      button:hover { border-color: var(--accent); color: var(--accent); }
      button[aria-pressed="true"] { background: var(--accent); color: #fff; border-color: var(--accent); }
      textarea {
        flex: 1;
        width: 100%;
        border: 0;
        resize: none;
        padding: clamp(0.75rem, 2vw, 1.25rem);
        font-family: var(--mono);
        font-size: 0.86rem;
        line-height: 1.55;
        background: var(--bg);
        color: var(--text);
        tab-size: 2;
      }
      textarea:focus { outline: none; }
      .output { flex: 1; overflow: auto; padding: clamp(0.75rem, 2vw, 1.5rem); }
      .toggle { display: flex; gap: 0.25rem; }
      .error {
        margin: 0;
        padding: 0.75rem 1rem;
        border: 1px solid var(--danger);
        background: var(--danger-bg);
        color: var(--danger);
        border-radius: 8px;
        font-family: var(--mono);
        font-size: 0.82rem;
        white-space: pre-wrap;
      }
      pre.source {
        margin: 0;
        font-family: var(--mono);
        font-size: 0.82rem;
        white-space: pre-wrap;
        word-break: break-word;
      }
      /* Rendered-markdown preview styles */
      .preview :first-child { margin-top: 0; }
      .preview h1 { font-size: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 0.3rem; }
      .preview h2 { font-size: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 0.3rem; }
      .preview h3 { font-size: 1.25rem; }
      .preview h4 { font-size: 1rem; }
      .preview h5 { font-size: 0.875rem; }
      .preview h6 { font-size: 0.85rem; color: var(--muted); }
      .preview code { font-family: var(--mono); background: var(--code-bg); padding: 0.15em 0.35em; border-radius: 5px; font-size: 0.88em; }
      .preview a { color: var(--accent); }
      .preview table { border-collapse: collapse; margin: 0.5rem 0; display: block; overflow-x: auto; }
      .preview th, .preview td { border: 1px solid var(--border); padding: 0.35rem 0.7rem; }
      .preview th { background: var(--panel); }
      .preview ul { padding-left: 1.3rem; }
    </style>
  </head>
  <body>
    <header>
      <h1><code>json-to-md</code> · live demo</h1>
      <p>
        Paste any JSON on the left. It is converted with
        <code>convertJsonText</code> into deterministic GitHub Flavored Markdown, shown
        rendered (or as raw source) on the right.
      </p>
    </header>
    <main>
      <section class="pane">
        <div class="pane-head">
          <strong>JSON input</strong>
          <div class="examples" id="examples"></div>
        </div>
        <textarea id="input" spellcheck="false" autocapitalize="off" autocomplete="off"></textarea>
      </section>
      <section class="pane">
        <div class="pane-head">
          <strong>Output</strong>
          <div class="toggle">
            <button id="mode-preview" aria-pressed="true">Preview</button>
            <button id="mode-source" aria-pressed="false">Markdown</button>
          </div>
        </div>
        <div class="output" id="output"></div>
      </section>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
